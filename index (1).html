<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cờ Caro</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f13;
  --surface:#17171f;
  --surface2:#1e1e28;
  --surface3:#25252f;
  --border:#2e2e3a;
  --border2:#3a3a48;
  --text:#f0f0f8;
  --text2:#9898b0;
  --text3:#5a5a70;
  --accent:#7c6af7;
  --accent2:#9d8fff;
  --accent-glow:rgba(124,106,247,0.3);
  --red:#f05a5a;
  --red-glow:rgba(240,90,90,0.3);
  --gold:#f5c842;
  --gold-glow:rgba(245,200,66,0.4);
  --green:#4ecb71;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;overflow-x:hidden;}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* bg stars */
body::before{
  content:"";position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(124,106,247,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(240,90,90,0.06) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--delay,0s) infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(1);}50%{opacity:0.7;transform:scale(1.3);}}

.app{position:relative;z-index:1;width:100%;max-width:1100px;padding:24px 16px 60px;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:14px;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-icon{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),#b06af7);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  box-shadow:0 0 24px var(--accent-glow), 0 0 60px rgba(124,106,247,0.1);
  animation:logoFloat 4s ease-in-out infinite;
}
@keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
h1{font-size:clamp(22px,4vw,32px);font-weight:800;
  background:linear-gradient(135deg,var(--text),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{font-size:12px;color:var(--text3);letter-spacing:0.12em;margin-top:3px;}

.hbtns{display:flex;gap:10px;}
.hbtn{
  width:42px;height:42px;border-radius:12px;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.hbtn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px var(--accent-glow);}
.hbtn svg{width:18px;height:18px;}

/* STATUS */
.status{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:14px 20px;margin-bottom:20px;
  gap:12px;flex-wrap:wrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.players{display:flex;gap:10px;}
.player-chip{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px 8px 10px;border-radius:999px;
  border:1px solid var(--border2);background:var(--surface2);
  font-size:13px;font-weight:600;color:var(--text2);
  transition:all .3s ease;
}
.player-chip.active-x{
  border-color:var(--accent);color:var(--text);
  background:rgba(124,106,247,0.12);
  box-shadow:0 0 16px var(--accent-glow);
}
.player-chip.active-o{
  border-color:var(--red);color:var(--text);
  background:rgba(240,90,90,0.12);
  box-shadow:0 0 16px var(--red-glow);
}
.pdot{width:16px;height:16px;border-radius:50%;}
.pdot.x{background:radial-gradient(circle at 35% 30%,#a89fff,var(--accent));box-shadow:0 0 8px var(--accent-glow);}
.pdot.o{background:radial-gradient(circle at 35% 30%,#ff8f8f,var(--red));box-shadow:0 0 8px var(--red-glow);}

.scores{display:flex;gap:8px;}
.score-pill{
  display:flex;flex-direction:column;align-items:center;
  padding:6px 14px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border);
  min-width:50px;
}
.score-pill .slabel{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;}
.score-pill .sval{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;}
.score-pill.sx .sval{color:var(--accent);}
.score-pill.so .sval{color:var(--red);}

.meta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);}
.meta b{color:var(--text2);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 300px;gap:22px;align-items:start;}
@media(max-width:820px){.layout{grid-template-columns:1fr;}}

/* BOARD */
.board-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;padding:22px;
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
}
.board-wrap::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(124,106,247,0.05) 0%, transparent 60%);
  pointer-events:none;
}
.ai-indicator{
  display:none;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border2);
  padding:8px 16px;border-radius:999px;
  font-size:12px;color:var(--text2);
  margin-bottom:16px;
}
.ai-indicator.show{display:flex;}
.ai-dots{display:flex;gap:4px;}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:aidot 1s infinite ease-in-out;}
.ai-dot:nth-child(2){animation-delay:.15s;}
.ai-dot:nth-child(3){animation-delay:.3s;}
@keyframes aidot{0%,100%{opacity:.3;transform:scale(.7);}50%{opacity:1;transform:scale(1);}}

.board-scroll{overflow:auto;max-width:100%;border-radius:14px;}
#board{
  display:grid;
  background:var(--surface3);
  border-radius:12px;
  border:1px solid var(--border);
  box-shadow:inset 0 2px 20px rgba(0,0,0,0.3);
  position:relative;
}
.cell{
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  margin:1px;border-radius:4px;
  transition:background .15s;
}
.cell:hover:not(.filled){background:rgba(124,106,247,0.1);}
.cell:hover:not(.filled)::after{
  content:"";position:absolute;inset:0;border-radius:4px;
  border:1px solid rgba(124,106,247,0.3);pointer-events:none;
}
.cell.filled{cursor:default;}
.cell.last-move::before{
  content:"";position:absolute;inset:0;border-radius:4px;
  border:2px solid var(--gold);box-shadow:inset 0 0 8px rgba(245,200,66,0.2);
  pointer-events:none;animation:lastBlink .6s ease;
}
@keyframes lastBlink{0%{opacity:0;}50%{opacity:1;}100%{opacity:1;}}
.cell.win-cell{background:rgba(245,200,66,0.12);}
.cell.win-cell::after{
  content:"";position:absolute;inset:0;border-radius:4px;
  border:1px solid var(--gold);box-shadow:0 0 10px var(--gold-glow);
  pointer-events:none;animation:winPulse 1s ease-in-out infinite;
}
@keyframes winPulse{0%,100%{opacity:.6;}50%{opacity:1;}}

.piece{
  width:76%;height:76%;border-radius:50%;
  animation:placePiece .2s cubic-bezier(.2,1.5,.5,1);
  position:relative;
}
@keyframes placePiece{from{transform:scale(0.1);opacity:0;}to{transform:scale(1);opacity:1;}}
.piece.x{
  background:radial-gradient(circle at 35% 30%, #b3a8ff, var(--accent) 60%);
  box-shadow:0 2px 12px var(--accent-glow), 0 0 24px rgba(124,106,247,0.2);
}
.piece.o{
  background:radial-gradient(circle at 35% 30%, #ff9f9f, var(--red) 60%);
  box-shadow:0 2px 12px var(--red-glow), 0 0 24px rgba(240,90,90,0.2);
}

/* ripple effect */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(124,106,247,0.3);
  transform:scale(0);animation:rippleAnim .4s ease-out forwards;
  pointer-events:none;
}
.ripple.o-ripple{background:rgba(240,90,90,0.3);}
@keyframes rippleAnim{to{transform:scale(3);opacity:0;}}

/* SIDE */
.panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:18px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.panel+.panel{margin-top:16px;}
.panel-title{
  font-size:11px;text-transform:uppercase;letter-spacing:0.12em;
  color:var(--text3);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.panel-title::before{content:"";width:12px;height:2px;background:var(--accent);display:inline-block;}

.seg{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:3px;}
.seg button{
  flex:1;border:none;background:transparent;
  padding:8px 4px;border-radius:7px;
  font-family:inherit;font-size:12.5px;font-weight:600;
  color:var(--text3);cursor:pointer;transition:all .15s;
}
.seg button.active{background:var(--surface3);color:var(--text);border:1px solid var(--border2);}
.seg button:not(.active):hover{color:var(--text2);}

.field{margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;}

.btn-main{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#9d6af7);
  color:#fff;font-family:inherit;font-weight:700;font-size:14px;
  cursor:pointer;
  box-shadow:0 4px 20px var(--accent-glow);
  transition:all .2s;position:relative;overflow:hidden;
}
.btn-main::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--accent-glow);}
.btn-main:active{transform:translateY(0);}

.btn-sec{
  width:100%;padding:11px;border:1px solid var(--border2);border-radius:12px;
  background:var(--surface2);color:var(--text2);
  font-family:inherit;font-weight:600;font-size:13px;
  cursor:pointer;margin-top:8px;transition:all .2s;
}
.btn-sec:hover{border-color:var(--accent);color:var(--accent);}
.btn-sec:disabled{opacity:.4;cursor:not-allowed;}

.hint{font-size:12px;color:var(--text3);margin-top:10px;line-height:1.6;}

.log{
  max-height:160px;overflow-y:auto;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;
  color:var(--text3);display:flex;flex-direction:column-reverse;gap:4px;
}
.log-entry{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);}
.log-entry:last-child{border:none;}
.log-entry b.lx{color:var(--accent);}
.log-entry b.lo{color:var(--red);}

/* WINNER BANNER */
.winner-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;
  z-index:200;padding:20px;
}
.winner-overlay.show{display:flex;}
.winner-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:24px;padding:36px 40px;
  text-align:center;max-width:380px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  animation:cardPop .4s cubic-bezier(.2,1.4,.5,1);
}
@keyframes cardPop{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
.winner-emoji{font-size:56px;margin-bottom:16px;animation:emojiSpin .5s .1s ease-out both;}
@keyframes emojiSpin{from{transform:rotate(-15deg) scale(0);}to{transform:rotate(0) scale(1);}}
.winner-title{font-size:28px;font-weight:800;margin-bottom:8px;}
.winner-title.x-win{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.winner-title.o-win{background:linear-gradient(135deg,var(--red),#ff9f9f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.winner-title.draw{background:linear-gradient(135deg,var(--gold),#ffe085);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.winner-sub{font-size:14px;color:var(--text2);margin-bottom:28px;}
.winner-btns{display:flex;gap:10px;}
.winner-btns .btn-main{margin:0;}
.winner-btns .btn-sec{margin:0;}

/* CONFETTI */
.confetti-piece{
  position:fixed;width:8px;height:8px;border-radius:2px;
  pointer-events:none;z-index:300;
  animation:confettiFall var(--dur,1.5s) var(--delay,0s) ease-in forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

/* SETTINGS MODAL */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-bg.show{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:22px;padding:28px;max-width:400px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.modal h3{font-size:20px;font-weight:700;margin-bottom:6px;}
.modal p{font-size:13px;color:var(--text3);margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-btns .btn-main,.modal-btns .btn-sec{margin:0;}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px;}
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">♟</div>
      <div>
        <h1>Cờ Caro</h1>
        <div class="subtitle">NGŨ TỬ LIÊN CHÂU · FIVE IN A ROW</div>
      </div>
    </div>
    <div class="hbtns">
      <button class="hbtn" id="undoBtn" title="Đi lại">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
      </button>
      <button class="hbtn" id="settingsBtn" title="Cài đặt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <div class="status">
    <div class="players">
      <div class="player-chip active-x" id="chipX"><span class="pdot x"></span><span id="labelX">Bạn (Tím)</span></div>
      <div class="player-chip" id="chipO"><span class="pdot o"></span><span id="labelO">Máy (Đỏ)</span></div>
    </div>
    <div class="meta">Nước: <b id="moveCount">0</b> &nbsp;|&nbsp; Bàn: <b id="sizeLabel">15×15</b></div>
    <div class="scores">
      <div class="score-pill sx"><span class="slabel">Tím</span><span class="sval" id="scoreX">0</span></div>
      <div class="score-pill"><span class="slabel">Hòa</span><span class="sval" id="scoreD">0</span></div>
      <div class="score-pill so"><span class="slabel">Đỏ</span><span class="sval" id="scoreO">0</span></div>
    </div>
  </div>

  <div class="layout">
    <div class="board-wrap">
      <div class="ai-indicator" id="aiIndicator">
        <div class="ai-dots"><span class="ai-dot"></span><span class="ai-dot"></span><span class="ai-dot"></span></div>
        Máy đang suy nghĩ...
      </div>
      <div class="board-scroll"><div id="board"></div></div>
    </div>

    <div class="side">
      <div class="panel">
        <div class="panel-title">Ván cờ</div>
        <button class="btn-main" id="newBtn">✦ Ván mới</button>
        <button class="btn-sec" id="undoBtn2">↩ Đi lại nước trước</button>
        <p class="hint" id="turnHint">Đến lượt bạn — bấm vào ô để đặt quân.</p>
      </div>
      <div class="panel">
        <div class="panel-title">Lịch sử nước đi</div>
        <div class="log" id="log"><div style="color:var(--text3);font-size:12px;">Chưa có nước đi nào.</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Winner overlay -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-card">
    <div class="winner-emoji" id="winnerEmoji">🏆</div>
    <div class="winner-title" id="winnerTitle">Bạn thắng!</div>
    <div class="winner-sub" id="winnerSub">Đủ 5 quân liên tiếp</div>
    <div class="winner-btns">
      <button class="btn-main" id="playAgainBtn">✦ Chơi tiếp</button>
      <button class="btn-sec" id="closeWinnerBtn">Đóng</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Cài đặt</h3>
    <p>Thay đổi sẽ bắt đầu một ván mới.</p>
    <div class="field"><label>Chế độ chơi</label>
      <div class="seg" id="modeSeg">
        <button data-val="ai" class="active">Người vs Máy</button>
        <button data-val="pvp">Người vs Người</button>
      </div>
    </div>
    <div class="field" id="diffField"><label>Độ khó</label>
      <div class="seg" id="diffSeg">
        <button data-val="easy">Dễ</button>
        <button data-val="medium" class="active">Vừa</button>
        <button data-val="hard">Khó</button>
      </div>
    </div>
    <div class="field"><label>Kích thước bàn</label>
      <div class="seg" id="sizeSeg">
        <button data-val="11">11×11</button>
        <button data-val="15" class="active">15×15</button>
        <button data-val="19">19×19</button>
      </div>
    </div>
    <div class="field"><label>Người đi trước</label>
      <div class="seg" id="firstSeg">
        <button data-val="x" class="active">Tím (Bạn)</button>
        <button data-val="o" id="firstOBtn">Đỏ (Máy)</button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-sec" id="cancelModal">Hủy</button>
      <button class="btn-main" id="applyModal">Áp dụng</button>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

// Generate stars
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s = document.createElement('div');
  s.className='star';
  const size = Math.random()*2+1;
  s.style.cssText=`
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    width:${size}px;height:${size}px;
    --d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;
  `;
  starsEl.appendChild(s);
}

const cfg = {mode:'ai',diff:'medium',size:15,first:'x'};
let board,cur,history,over,winLine,scores={x:0,o:0,d:0},busy=false;

const $ = id => document.getElementById(id);
const boardEl = $('board');

function colLabel(c){
  let n=c,s='';
  do{s=String.fromCharCode(65+(n%26))+s;n=Math.floor(n/26)-1;}while(n>=0);
  return s;
}

function init(){
  const n=cfg.size;
  board=Array.from({length:n},()=>Array(n).fill(null));
  cur='x';history=[];over=false;winLine=null;busy=false;
  $('sizeLabel').textContent=n+'×'+n;
  $('moveCount').textContent=0;
  $('labelX').textContent=cfg.mode==='ai'?'Bạn (Tím)':'Người 1 (Tím)';
  $('labelO').textContent=cfg.mode==='ai'?'Máy (Đỏ)':'Người 2 (Đỏ)';
  $('winnerOverlay').classList.remove('show');
  $('aiIndicator').classList.remove('show');
  $('log').innerHTML='<div style="color:var(--text3);font-size:12px;">Chưa có nước đi nào.</div>';
  renderBoard();
  updateStatus();
  if(cfg.first==='o'&&cfg.mode==='ai'){busy=true;setTimeout(aiMove,500);}
}

function renderBoard(){
  const n=cfg.size;
  const px=n<=11?40:n<=15?34:27;
  boardEl.style.gridTemplateColumns=`repeat(${n},${px}px)`;
  boardEl.innerHTML='';
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    const el=document.createElement('div');
    el.className='cell';
    el.style.width=el.style.height=px+'px';
    el.dataset.r=r;el.dataset.c=c;
    el.addEventListener('click',onCell);
    boardEl.appendChild(el);
  }
}

function cellEl(r,c){return boardEl.children[r*cfg.size+c];}

function onCell(e){
  if(over||busy)return;
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  if(board[r][c])return;
  if(cfg.mode==='ai'&&cur==='o')return;
  place(r,c,cur);
  if(checkWin(r,c))return;
  if(cfg.mode==='ai'){busy=true;$('aiIndicator').classList.add('show');setTimeout(aiMove,350+Math.random()*300);}
}

function place(r,c,player){
  board[r][c]=player;
  history.push({r,c,player});
  document.querySelectorAll('.cell.last-move').forEach(el=>el.classList.remove('last-move'));
  const el=cellEl(r,c);
  el.classList.add('filled','last-move');
  const p=document.createElement('div');
  p.className='piece '+player;
  el.appendChild(p);
  // ripple
  const rip=document.createElement('div');
  rip.className='ripple'+(player==='o'?' o-ripple':'');
  rip.style.cssText='width:100%;height:100%;top:0;left:0;';
  el.appendChild(rip);
  setTimeout(()=>rip.remove(),400);
  // log
  addLog(r,c,player);
  $('moveCount').textContent=history.length;
}

function addLog(r,c,player){
  const logEl=$('log');
  if(logEl.children.length===1&&logEl.firstChild.style&&!logEl.firstChild.className){logEl.innerHTML='';}
  const d=document.createElement('div');
  d.className='log-entry';
  d.innerHTML=`<span><b class="l${player}">${player==='x'?'Tím':'Đỏ'}</b> ${colLabel(c)}${r+1}</span><span style="color:var(--text3);">#${history.length}</span>`;
  logEl.insertBefore(d,logEl.firstChild);
}

function checkWin(r,c){
  const player=board[r][c];
  const line=getWin(r,c,player);
  if(line){
    over=true;winLine=line;
    line.forEach(([rr,cc])=>cellEl(rr,cc).classList.add('win-cell'));
    scores[player]++;updateScores();
    setTimeout(()=>showWinner(player),600);
    return true;
  }
  if(history.length===cfg.size*cfg.size){
    over=true;scores.d++;updateScores();
    setTimeout(()=>showWinner(null),600);
    return true;
  }
  cur=cur==='x'?'o':'x';
  updateStatus();
  return false;
}

function showWinner(player){
  const overlay=$('winnerOverlay');
  const emoji=$('winnerEmoji');
  const title=$('winnerTitle');
  const sub=$('winnerSub');
  title.className='winner-title';
  if(player===null){
    emoji.textContent='🤝';title.textContent='Ván hòa!';title.classList.add('draw');
    sub.textContent='Bàn cờ đã kín — không ai thắng';
  } else if(player==='x'){
    emoji.textContent='🏆';
    title.textContent=cfg.mode==='ai'?'Bạn thắng!':'Người 1 thắng!';
    title.classList.add('x-win');sub.textContent='5 quân tím liên tiếp ✦';
    confetti();
  } else {
    emoji.textContent=cfg.mode==='ai'?'🤖':'🏆';
    title.textContent=cfg.mode==='ai'?'Máy thắng!':'Người 2 thắng!';
    title.classList.add('o-win');sub.textContent='5 quân đỏ liên tiếp';
    if(cfg.mode==='pvp')confetti();
  }
  overlay.classList.add('show');
}

function confetti(){
  const colors=['#7c6af7','#f05a5a','#f5c842','#4ecb71','#ff9f9f','#b3a8ff'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`
      left:${Math.random()*100}vw;
      top:-10px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dur:${1+Math.random()*1.5}s;
      --delay:${Math.random()*.8}s;
      transform:rotate(${Math.random()*360}deg);
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(2.5)*1000);
  }
}

function updateScores(){
  $('scoreX').textContent=scores.x;
  $('scoreO').textContent=scores.o;
  $('scoreD').textContent=scores.d;
}

function updateStatus(){
  $('chipX').className='player-chip'+(cur==='x'?' active-x':'');
  $('chipO').className='player-chip'+(cur==='o'?' active-o':'');
  if(cfg.mode==='ai'){
    $('turnHint').textContent=cur==='x'?'Đến lượt bạn — bấm vào ô để đặt quân.':'Đến lượt Máy...';
  } else {
    $('turnHint').textContent=(cur==='x'?'Người 1 (Tím)':'Người 2 (Đỏ)')+' đi.';
  }
}

const DIRS=[[0,1],[1,0],[1,1],[1,-1]];
function getWin(r,c,player){
  const n=cfg.size;
  for(const [dr,dc] of DIRS){
    let cells=[[r,c]];
    for(let s=1;s<5;s++){const rr=r+dr*s,cc=c+dc*s;if(rr<0||rr>=n||cc<0||cc>=n||board[rr][cc]!==player)break;cells.push([rr,cc]);}
    for(let s=1;s<5;s++){const rr=r-dr*s,cc=c-dc*s;if(rr<0||rr>=n||cc<0||cc>=n||board[rr][cc]!==player)break;cells.push([rr,cc]);}
    if(cells.length>=5){cells.sort((a,b)=>a[0]-b[0]||a[1]-b[1]);return cells.slice(0,5);}
  }
  return null;
}

function undo(){
  if(busy)return;
  if(!history.length)return;
  if(over){
    over=false;$('winnerOverlay').classList.remove('show');
    if(winLine)winLine.forEach(([r,c])=>cellEl(r,c).classList.remove('win-cell'));
    winLine=null;
  }
  const back=cfg.mode==='ai'&&history.length>=2?2:1;
  for(let i=0;i<back&&history.length;i++){
    const last=history.pop();
    board[last.r][last.c]=null;
    const el=cellEl(last.r,last.c);
    el.classList.remove('filled','last-move');el.innerHTML='';
    if($('log').firstChild)$('log').removeChild($('log').firstChild);
  }
  if(!history.length)$('log').innerHTML='<div style="color:var(--text3);font-size:12px;">Chưa có nước đi nào.</div>';
  if(history.length){const lm=history[history.length-1];cellEl(lm.r,lm.c).classList.add('last-move');cur=lm.player==='x'?'o':'x';}
  else cur='x';
  $('moveCount').textContent=history.length;
  updateStatus();
}

// AI
function candidates(){
  const n=cfg.size;const set=new Set();let any=false;
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    if(board[r][c]){any=true;
      for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
        const rr=r+dr,cc=c+dc;
        if(rr>=0&&rr<n&&cc>=0&&cc<n&&!board[rr][cc])set.add(rr*n+cc);
      }
    }
  }
  if(!any){const m=Math.floor(n/2);return[{r:m,c:m}];}
  return[...set].map(v=>({r:Math.floor(v/cfg.size),c:v%cfg.size}));
}
function lineScore(r,c,dr,dc,player){
  const n=cfg.size;let cnt=1,open=0;
  let rr=r+dr,cc=c+dc;
  while(rr>=0&&rr<n&&cc>=0&&cc<n&&board[rr][cc]===player){cnt++;rr+=dr;cc+=dc;}
  if(rr>=0&&rr<n&&cc>=0&&cc<n&&!board[rr][cc])open++;
  rr=r-dr;cc=c-dc;
  while(rr>=0&&rr<n&&cc>=0&&cc<n&&board[rr][cc]===player){cnt++;rr-=dr;cc-=dc;}
  if(rr>=0&&rr<n&&cc>=0&&cc<n&&!board[rr][cc])open++;
  if(cnt>=5)return 1e5;
  if(cnt===4)return open===2?12000:open===1?2200:0;
  if(cnt===3)return open===2?1800:open===1?220:0;
  if(cnt===2)return open===2?180:open===1?30:0;
  return open===2?8:2;
}
function evalCell(r,c,player){let t=0;for(const[dr,dc]of DIRS)t+=lineScore(r,c,dr,dc,player);return t;}
function aiMove(){
  $('aiIndicator').classList.remove('show');
  if(over){busy=false;return;}
  const cands=candidates();
  let best=null,bs=-Infinity;
  const scored=[];
  for(const{r,c}of cands){
    board[r][c]='o';const off=evalCell(r,c,'o');const win=!!getWin(r,c,'o');board[r][c]=null;
    board[r][c]='x';const def=evalCell(r,c,'x');const oppWin=!!getWin(r,c,'x');board[r][c]=null;
    let sc=off*1.05+def*0.95;
    if(win)sc+=1e7;if(oppWin)sc+=5e6;
    const m=(cfg.size-1)/2;sc-=(Math.abs(r-m)+Math.abs(c-m))*0.4;
    scored.push({r,c,sc});if(sc>bs){bs=sc;best={r,c};}
  }
  scored.sort((a,b)=>b.sc-a.sc);
  let move=best;
  if(cfg.diff==='easy'&&Math.random()<0.55)move=scored[Math.floor(Math.random()*Math.min(6,scored.length))];
  else if(cfg.diff==='medium'&&Math.random()<0.25)move=scored[Math.floor(Math.random()*Math.min(3,scored.length))];
  busy=false;
  if(!move)return;
  place(move.r,move.c,'o');
  checkWin(move.r,move.c);
}

// UI wiring
$('newBtn').addEventListener('click',init);
$('undoBtn').addEventListener('click',undo);
$('undoBtn2').addEventListener('click',undo);
$('playAgainBtn').addEventListener('click',()=>{$('winnerOverlay').classList.remove('show');init();});
$('closeWinnerBtn').addEventListener('click',()=>$('winnerOverlay').classList.remove('show'));

$('settingsBtn').addEventListener('click',()=>$('modalBg').classList.add('show'));
$('cancelModal').addEventListener('click',()=>$('modalBg').classList.remove('show'));
$('modalBg').addEventListener('click',e=>{if(e.target===$('modalBg'))$('modalBg').classList.remove('show');});
$('applyModal').addEventListener('click',()=>{$('modalBg').classList.remove('show');init();});

function wireSeg(id,key,cb){
  const seg=$(id);
  seg.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      seg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      cfg[key]=isNaN(+btn.dataset.val)?btn.dataset.val:+btn.dataset.val;
      if(cb)cb();
    });
  });
}
wireSeg('modeSeg','mode',()=>{
  $('diffField').style.display=cfg.mode==='ai'?'':'none';
  $('firstOBtn').textContent=cfg.mode==='ai'?'Đỏ (Máy)':'Người 2 (Đỏ)';
});
wireSeg('diffSeg','diff');
wireSeg('sizeSeg','size');
wireSeg('firstSeg','first');

document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z')undo();});

init();
})();
</script>
